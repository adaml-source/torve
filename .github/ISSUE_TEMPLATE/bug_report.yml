name: Bug report
description: Report a reproducible Torve bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, tokens, service-account data, private logs, or sensitive user data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest reliable reproduction.
      placeholder: |
        1. Open ...
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Backend
        - Shared KMP
        - Android mobile
        - Google TV
        - Amazon Fire TV
        - Desktop
        - iOS
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: App version, build variant, or commit SHA.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact credentials, tokens, account IDs, and private user data.
      render: text
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      description: List any local commands or tests you ran.

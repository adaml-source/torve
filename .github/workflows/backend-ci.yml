name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg2://torve_test:torve_test@localhost:5432/torve_test
      JWT_SECRET: ci-only-jwt-secret-do-not-use-in-prod
      INTEGRATION_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_ENV: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: torve_test
          POSTGRES_PASSWORD: torve_test
          POSTGRES_DB: torve_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U torve_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Alembic migrations apply against an empty database
        run: |
          alembic upgrade head
          alembic current

      - name: Run pytest
        run: pytest -v --tb=short

  import-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg2://nobody:nobody@localhost:5432/nobody
      JWT_SECRET: import-check-only
      INTEGRATION_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import every module
        run: |
          python -c "
          import importlib, pkgutil
          import app
          for _, name, _ in pkgutil.walk_packages(app.__path__, 'app.'):
              importlib.import_module(name)
              print(f'  ok: {name}')
          "
